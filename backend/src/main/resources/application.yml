server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: book-platform

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/book_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.book.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: campusBookPlatformSecretKey2024VeryLongAndSecure
  expiration: 604800000
  header: Authorization
  prefix: "Bearer "

quartz:
  auto-startup: true

logging:
  level:
    com.campus.book: DEBUG
    org.springframework.security: INFO
  file:
    name: logs/book-platform.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 10GB

aliyun:
  oss:
    endpoint:
    bucket-name:
    access-key-id:
    access-key-secret:
    domain:
